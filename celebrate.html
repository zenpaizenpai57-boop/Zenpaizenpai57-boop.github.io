<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe4e1; /* Light pink background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .celebrate-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* Gap between GIF and Text */
            text-align: center;
        }

        .gif-wrapper img {
            max-width: 280px; 
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #d11a5b;
            font-size: 2.2rem;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="celebrate-container">
        <!-- The GIF container sits perfectly on top -->
        <div class="gif-wrapper">
            <!-- Fixed: Using a direct link to a cute cat kiss GIF -->
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbms1M2kyZ3M4NjN6NDN0M3Nndmt0Zms0N205Y3V2N3R6YmN6bW82dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/kU0g3xMPZmFYk/giphy.gif" alt="Cute cat kiss animation">
        </div>
        
        <!-- The text sits directly below the GIF -->
        <h2>I knew you loved me rarrr 🫦🥰</h2>
    </div>

</body>
</html>
